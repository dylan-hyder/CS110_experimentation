<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS110 Code Structure Visualizer</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --border: #334155;
            
            /* Scope Colors */
            --color-func: #ec4899;
            --color-loop: #eab308;
            --color-cond: #22c55e;
            --color-line: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--panel-bg);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 1.25rem; font-weight: 600; color: var(--accent); }
        .subtitle { font-size: 0.85rem; color: var(--text-muted); }

        .dashboard {
            flex: 1;
            display: flex;
            padding: 1.5rem;
            gap: 1.5rem;
            overflow: hidden;
        }

        .panel {
            flex: 1;
            background-color: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            background-color: rgba(0,0,0,0.2);
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        textarea {
            flex: 1;
            background-color: transparent;
            border: none;
            color: #e2e8f0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            padding: 1rem;
            resize: none;
            outline: none;
            line-height: 1.5;
        }

        .visualizer-output {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            font-family: monospace;
        }

        /* Visual Structure Blocks */
        .scope-block {
            margin: 4px 0;
            padding: 8px 12px;
            border-left: 4px solid var(--border);
            border-radius: 0 4px 4px 0;
            background-color: rgba(255,255,255,0.02);
        }
        
        .scope-title {
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .scope-line {
            padding-left: 8px;
            color: var(--text-muted);
            font-size: 0.85rem;
            opacity: 0.8;
            white-space: pre-wrap;
        }

        /* Specific Block Themes */
        .block-function { border-left-color: var(--color-func); background-color: rgba(236, 72, 153, 0.05); }
        .block-function > .scope-title { color: var(--color-func); }

        .block-loop { border-left-color: var(--color-loop); background-color: rgba(234, 179, 8, 0.05); }
        .block-loop > .scope-title { color: var(--color-loop); }

        .block-conditional { border-left-color: var(--color-cond); background-color: rgba(34, 197, 94, 0.05); }
        .block-conditional > .scope-title { color: var(--color-cond); }

        .placeholder {
            color: var(--text-muted);
            font-style: italic;
            text-align: center;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>CS110 Code Structure Visualizer</h1>
            <p class="subtitle">Paste your code to see how the computer groups your logic</p>
        </div>
    </header>

    <div class="dashboard">
        <div class="panel">
            <div class="panel-header">Paste Code Snippet Here</div>
            <textarea id="codeInput" placeholder="# Example:
def check_numbers(lines):
    for num in lines:
        if num > 10:
            print('Large number!')
        else:
            print('Small number')"></textarea>
        </div>

        <div class="panel">
            <div class="panel-header">Visual Structural Map</div>
            <div class="visualizer-output" id="visualizerOutput">
                <div class="placeholder">Waiting for code input...</div>
            </div>
        </div>
    </div>

    <script>
        const codeInput = document.getElementById('codeInput');
        const visualizerOutput = document.getElementById('visualizerOutput');

        codeInput.addEventListener('input', () => {
            const code = codeInput.value;
            if (!code.trim()) {
                visualizerOutput.innerHTML = '<div class="placeholder">Waiting for code input...</div>';
                return;
            }
            renderStructure(code);
        });

        function renderStructure(code) {
            const lines = code.split('\n');
            visualizerOutput.innerHTML = '';
            
            // Root container to append structural HTML elements
            let currentContainer = visualizerOutput;
            // Track active stack of containers and their indentation levels
            const stack = [{ indent: -1, element: visualizerOutput }];

            lines.forEach((line) => {
                // Skip completely empty lines
                if (!line.trim()) return;

                // Calculate indentation level (count spaces)
                const indent = line.search(/\S/);
                const trimmedLine = line.trim();

                // Determine block type based on intro keywords
                let blockType = null;
                let blockLabel = '';

                if (trimmedLine.startsWith('def ') || trimmedLine.startsWith('function ')) {
                    blockType = 'block-function';
                    blockLabel = '⚙️ Function Scope';
                } else if (trimmedLine.startsWith('for ') || trimmedLine.startsWith('while ')) {
                    blockType = 'block-loop';
                    blockLabel = '🔄 Loop Block';
                } else if (trimmedLine.startsWith('if ') || trimmedLine.startsWith('elif ') || trimmedLine.startsWith('else:') || trimmedLine.startsWith('else ')) {
                    blockType = 'block-conditional';
                    blockLabel = '🌿 Conditional Branch';
                }

                // Manage scope stack using indentation level
                while (stack.length > 1 && indent <= stack[stack.length - 1].indent) {
                    stack.pop();
                }
                currentContainer = stack[stack.length - 1].element;

                if (blockType) {
                    // Create a structural nesting container
                    const blockDiv = document.createElement('div');
                    blockDiv.className = `scope-block ${blockType}`;
                    
                    const titleDiv = document.createElement('div');
                    titleDiv.className = 'scope-title';
                    titleDiv.textContent = `${blockLabel}: ${trimmedLine}`;
                    blockDiv.appendChild(titleDiv);

                    currentContainer.appendChild(blockDiv);
                    
                    // Push this new block onto the stack so its children nest inside it
                    stack.push({ indent: indent, element: blockDiv });
                } else {
                    // Standard execution line inside the current active scope
                    const lineDiv = document.createElement('div');
                    lineDiv.className = 'scope-line';
                    lineDiv.textContent = trimmedLine;
                    currentContainer.appendChild(lineDiv);
                }
            });
        }
    </script>
</body>
</html>
